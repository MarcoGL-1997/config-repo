server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

management.endpoints.web.exposure.include=*

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=ms-productos
spring.cloud.gateway.server.webflux.routes[0].uri=lb://MS-PRODUCTOS
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/productos/**

spring.cloud.gateway.server.webflux.routes[1].id=ms-inventario
spring.cloud.gateway.server.webflux.routes[1].uri=lb://MS-INVENTARIO
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/inventario/**